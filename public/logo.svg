<svg width="260" height="96" viewBox="0 0 260 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gobernación de Córdoba">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a3e8a" />
      <stop offset="100%" stop-color="#0a2c6b" />
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="260" height="96" rx="18" ry="18" fill="url(#bg)" />
  <rect x="3" y="3" width="254" height="90" rx="15" ry="15" fill="rgba(255,255,255,0.08)" />

  <!-- Shield icon (simplified) -->
  <g transform="translate(18 14)">
    <rect width="58" height="64" rx="10" ry="10" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="2" />
    <path d="M 16 14 L 42 14 L 34 34 L 34 46 L 22 46 L 22 34 Z" fill="rgba(255,255,255,0.9)" />
    <circle cx="29" cy="52" r="4" fill="rgba(255,255,255,0.9)" />
    <text x="29" y="10" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.9)">OMNIA</text>
    <text x="29" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.9)">PER IPSA</text>
  </g>

  <!-- Title -->
  <text x="96" y="38" fill="#ffffff" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="16">GOBERNACIÓN DE</text>
  <text x="96" y="62" fill="#ffffff" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="22">CÓRDOBA</text>

  <!-- Small flag shape -->
  <g transform="translate(96 70)">
    <rect width="140" height="14" rx="7" ry="7" fill="#ffffff" opacity="0.1" />
    <rect x="8" y="2" width="24" height="10" rx="3" ry="3" fill="url(#flag)" />
    <path d="M 40 3 L 52 7 L 40 11 Z" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
